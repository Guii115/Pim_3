<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameShop - Produtos</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar-container"></aside>
    <main class="main">
      <div class="topbar">
        <h1 id="tituloTela">Produtos</h1>
        <div class="topbar-right">
          <span id="nomeUsuarioLogado" class="topbar-usuario"></span>
          <div id="dataHora"></div>
          <button class="btn btn-danger topbar-btn-sair" onclick="fazerLogout()">Sair</button>
        </div>
      </div>
      <div class="content">
        <section id="produtos" style="display:block;">
          <div class="panel">
            <h2>Cadastro de Produtos</h2>
            <input type="hidden" id="produtoEditando">
            <div class="form-grid">
              <input type="file" id="fotoProduto" accept="image/*">
              <input type="text" id="codigoFiscalProduto" placeholder="Código (gerado automaticamente)" readonly>
              <input type="text" id="nomeProduto" placeholder="Nome do produto">
              <select id="categoriaProduto" onchange="onCategoriaChange()">
                <option value="">Selecione a categoria</option>
                <option value="1">Jogos Mídia Física</option>
                <option value="2">Acessórios</option>
                <option value="3">Consoles</option>
              </select>
              <div id="campoPlatforma" style="display:none;">
                <select id="plataformaProduto" style="width:100%;">
                  <option value="">Selecione a plataforma</option>
                  <option>PlayStation</option>
                  <option>Xbox</option>
                  <option>Nintendo</option>
                  <option>PC</option>
                  <option>Outro</option>
                </select>
              </div>
              <input type="number" id="precoProduto" placeholder="Preço (R$)" min="0" step="0.01">
              <input type="number" id="quantidadeProduto" placeholder="Quantidade em estoque" min="0">
            </div>
            <br>
            <button class="btn" onclick="salvarProduto()">Salvar Produto</button>
          </div>
          <div class="panel">
            <h2>Produtos cadastrados</h2>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Foto</th>
                    <th>Código</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Plataforma</th>
                    <th>Preço</th>
                    <th>Qtd</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="listaProdutos"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="../JavaScript/script.js"></script>
</body>
</html>
