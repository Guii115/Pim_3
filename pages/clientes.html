<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameShop - Clientes</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar-container"></aside>
    <main class="main">
      <div class="topbar">
        <h1 id="tituloTela">Clientes</h1>
        <div class="topbar-right">
          <span id="nomeUsuarioLogado" class="topbar-usuario"></span>
          <div id="dataHora"></div>
          <button class="btn btn-danger topbar-btn-sair" onclick="fazerLogout()">Sair</button>
        </div>
      </div>
      <div class="content">
        <section id="clientes" style="display:block;">
          <div class="panel">
            <h2>Cadastro de Clientes</h2>
            <input type="hidden" id="clienteEditando">
            <div class="form-grid">
              <div>
                <input type="text" id="nomeCliente" placeholder="Nome completo">
                <p id="erroNome" class="erro-mensagem"></p>
              </div>
              <div>
                <input type="text" id="cpfCliente" placeholder="CPF" maxlength="14">
                <p id="erroCpf" class="erro-mensagem"></p>
              </div>
              <div>
                <input type="text" id="telefoneCliente" placeholder="Telefone" maxlength="15">
                <p id="erroTelefone" class="erro-mensagem"></p>
              </div>
              <div>
                <input type="email" id="emailCliente" placeholder="E-mail">
                <p id="erroEmail" class="erro-mensagem"></p>
              </div>
            </div>
            <br>
            <div class="actions">
              <button class="btn" onclick="salvarCliente()">Salvar Cliente</button>
              <button class="btn" onclick="limparFormularioCliente()" style="background:var(--muted);">Cancelar / Limpar</button>
            </div>
          </div>
          <div class="panel">
            <h2>Clientes cadastrados</h2>
            <div style="margin-bottom:1rem;">
              <input type="text" id="buscarCliente" placeholder="Buscar cliente pelo nome..." oninput="filtrarClientes()">
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Telefone</th>
                    <th>E-mail</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="listaClientes"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="../JavaScript/script.js"></script>
</body>
</html>
