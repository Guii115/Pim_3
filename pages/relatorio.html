<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameShop - Relatório Mensal</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar-container"></aside>
    <main class="main">
      <div class="topbar">
        <h1 id="tituloTela">Relatório Mensal</h1>
        <div class="topbar-right">
          <span id="nomeUsuarioLogado" class="topbar-usuario"></span>
          <div id="dataHora"></div>
          <button class="btn btn-danger topbar-btn-sair" onclick="fazerLogout()">Sair</button>
        </div>
      </div>
      <div class="content">
        <section id="relatorio" style="display:block;">
          <div class="panel">
            <h2>Relatório Mensal</h2>
            <div class="form-grid">
              <input type="month" id="mesRelatorio">
            </div>
            <br>
            <button class="btn" onclick="gerarRelatorioMensal()">Gerar Relatório</button>
          </div>
          <div class="cards">
            <div class="card neon-green">
              <small>Vendas no mês</small>
              <h2 id="relQtdVendas">0</h2>
            </div>
            <div class="card neon-pink">
              <small>Faturamento mensal</small>
              <h2 id="relFaturamento">R$ 0,00</h2>
            </div>
            <div class="card neon-blue">
              <small>Itens vendidos</small>
              <h2 id="relItensVendidos">0</h2>
            </div>
            <div class="card neon-purple">
              <small>Ticket médio</small>
              <h2 id="relTicketMedio">R$ 0,00</h2>
            </div>
          </div>
          <div class="panel">
            <h2>Total por Forma de Pagamento</h2>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Forma</th>
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody id="relPagamentos"></tbody>
              </table>
            </div>
          </div>
          <div class="panel">
            <h2>Produtos Mais Vendidos</h2>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Total vendido</th>
                  </tr>
                </thead>
                <tbody id="relProdutos"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="../JavaScript/script.js"></script>
</body>
</html>
